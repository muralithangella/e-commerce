<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>ShopDash — Mini E-Commerce Dashboard</title>
    <meta name="description" content="Browse products, manage your cart, and view order history on ShopDash — a fast, modern e-commerce dashboard." />
    <meta name="robots" content="index, follow" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#4f46e5" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="ShopDash — Mini E-Commerce Dashboard" />
    <meta property="og:description" content="Browse products, manage your cart, and view order history." />
    <meta property="og:site_name"   content="ShopDash" />

    <!-- Preconnect to API origin so DNS + TLS are resolved before first fetch -->
    <link rel="preconnect" href="https://dummyjson.com" />
    <link rel="preconnect" href="https://cdn.dummyjson.com" crossorigin />

    <!-- Preload the module entry point so the browser discovers it earlier -->
    <link rel="modulepreload" href="/src/main.jsx" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
